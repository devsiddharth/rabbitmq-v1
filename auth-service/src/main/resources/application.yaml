server:
  port: 8082

spring:
  application:
    name: auth-service

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: false
    hostname: localhost

jwt:
  secret: ThisIsMyVeryStrongSecretKeyForJwtGeneration12345
  issuer: stschools
  expiration: 86400000
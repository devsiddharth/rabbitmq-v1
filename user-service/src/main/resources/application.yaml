spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://localhost:3306/microservices_db
    username: root
    password: NewRoot@123

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true

server:
  port: 8081